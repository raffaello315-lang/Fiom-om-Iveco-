<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #joke {
            padding: 20px;
            border: 2px solid #002b5c; /* IVECO blue */
            border-radius: 10px;
            background-color: #ff3d00; /* FIOM red */
            color: white;
            text-align: center;
            width: 300px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #002b5c; /* IVECO blue */
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #001c3f;
        }
    </style>
</head>
<body>
    <div id="joke">Press the button for a joke!</div>
    <button onclick="fetchJoke()">Get a Joke</button>

    <script>
        async function fetchJoke() {
            const response = await fetch('https://v2.jokeapi.dev/joke/Any');
            const joke = await response.json();
            const jokeText = joke.setup ? `${joke.setup} - ${joke.delivery}` : joke.joke;
            document.getElementById('joke').innerHTML = jokeText;
        }
    </script>
</body>
</html>
